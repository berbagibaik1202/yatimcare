services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: yatimcare
      MYSQL_USER: yatimcare
      MYSQL_PASSWORD: yatimcare_password
      MYSQL_ROOT_PASSWORD: root_password_change_me
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u $$MYSQL_USER -p$$MYSQL_PASSWORD --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      AUTO_SCHEMA_BOOTSTRAP: "true"
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_USER: yatimcare
      DATABASE_PASSWORD: yatimcare_password
      DATABASE_NAME: yatimcare
      JWT_SECRET: change-me-in-docker
      CORS_ORIGIN: http://localhost:4000

volumes:
  mysql_data:
